name: CI

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: ./.github/actions/setup
      - run: yarn build
      - run: yarn test

  snyk:
    name: 🔒 Snyk scan
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'chore') }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: 🔒 Snyk test
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --yarn-workspaces --strict-out-of-sync=false --severity-threshold=high
          command: test

      - name: 🔒 Snyk monitor
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --yarn-workspaces --strict-out-of-sync=false
          command: monitor

  integration-test:
    name: 🧪 Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run integration tests
        working-directory: examples/cms-api
        run: docker compose up --build --abort-on-container-exit --exit-code-from integration-tests 2>&1 | tee integration-results.log
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: examples/cms-api/integration-results.log
      - name: Print test results
        if: always()
        working-directory: examples/cms-api
        run: cat integration-results.log
      - name: Cleanup
        if: always()
        working-directory: examples/cms-api
        run: docker compose down -v

  bump:
    name: 🤜 Bump packages
    needs: [build-and-test, snyk, integration-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: chriswoodle/bump-please-action@v1.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
