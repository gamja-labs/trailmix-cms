name: Bump

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: ./.github/actions/setup
      - run: yarn build

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: ./.github/actions/setup
      - run: yarn test

  bump:
    name: 🤜 Bump packages
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: chriswoodle/bump-please-action@v1.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
