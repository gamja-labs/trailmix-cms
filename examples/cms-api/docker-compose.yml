services:
  mongodb:
    image: mongo:8
    command: ["mongod", "--replSet", "rs0"]
    healthcheck:
      test: |
        mongosh --eval "
          try {
            var status = rs.status();
            if (status.ok === 1) quit(0);
            else quit(1);
          } catch(e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] });
            quit(1);
          }
        " --quiet
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 5s

  integration-tests:
    build:
      context: ../..
      dockerfile: examples/cms-api/Dockerfile.integration
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_CONNECTION_STRING: mongodb://mongodb:27017/?replicaSet=rs0
      NODE_ENV: test
